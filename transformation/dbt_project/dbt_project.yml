name: 'lakehouse_transformation'
version: '1.0.0'
config-version: 2

profile: 'lakehouse_profile'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

on-run-end:
  - "{{ elementary.upload_run_results() }}"

models:
  lakehouse_transformation:
    staging:
      +materialized: view
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
  elementary:
    +schema: elementary
