version: 2

models:
  - name: fct_orders
    description: "Gold layer fact table of transactions, enriched with payments, reviews, and delivery duration benchmarks."
    config:
      contract:
        enforced: true
      meta:
        owner: "data-platform-team"
        sla: "07:00 UTC"
        refresh_frequency: "daily"
        domain: "sales"
    columns:
      - name: order_id
        data_type: string
        description: "Primary key of the order."
        tests:
          - unique
          - not_null
      - name: customer_id
        data_type: string
        description: "Customer key for the transaction."
        meta:
          pii: true
          classification: "confidential"
        tests:
          - not_null
      - name: customer_unique_id
        data_type: string
        description: "Unique persistent identity of the customer."
        meta:
          pii: true
          classification: "confidential"
      - name: customer_city
        data_type: string
        description: "City name of the customer."
      - name: customer_state
        data_type: string
        description: "State acronym of the customer."
      - name: order_status
        data_type: string
        description: "Lifecycle state of the order."
      - name: order_purchase_timestamp
        data_type: timestamp
        description: "Timestamp when the order was placed."
      - name: order_approved_at
        data_type: timestamp
        description: "Timestamp when the payment was approved."
      - name: order_delivered_carrier_date
        data_type: timestamp
        description: "Timestamp when the order was handed over to the carrier."
      - name: order_delivered_customer_date
        data_type: timestamp
        description: "Timestamp when the customer received the order."
      - name: order_estimated_delivery_date
        data_type: timestamp
        description: "Estimated timestamp for delivery promised to the customer."
      - name: total_payment_sequences
        data_type: integer
        description: "Total count of payment sequences or split methods used."
      - name: total_payment_value
        data_type: numeric
        description: "Aggregated sum of all payment methods for the order."
      - name: max_payment_installments
        data_type: integer
        description: "Maximum split-payment installments chosen by the customer."
      - name: avg_review_score
        data_type: float64
        description: "Average customer satisfaction review score."
      - name: total_reviews
        data_type: integer
        description: "Total count of reviews submitted for the order."
      - name: delivery_time_days
        data_type: integer
        description: "Calculated actual transit duration in days."
      - name: delta_delivery_vs_estimated_days
        data_type: integer
        description: "Calculated variance in days between actual and estimated delivery."

  - name: dim_customers
    description: "Gold layer customer dimension, providing lifecycle value metrics and geographic locations."
    config:
      contract:
        enforced: true
      meta:
        owner: "marketing-analytics"
        sla: "07:00 UTC"
        refresh_frequency: "daily"
        domain: "customers"
    columns:
      - name: customer_unique_id
        data_type: string
        description: "Primary key. Unique, persistent identity of the customer."
        meta:
          pii: true
          classification: "confidential"
        tests:
          - unique
          - not_null
      - name: customer_city
        data_type: string
        description: "City name of the customer."
      - name: customer_state
        data_type: string
        description: "State acronym of the customer."
      - name: total_orders
        data_type: integer
        description: "Lifecycle purchase count for this customer."
      - name: total_lifetime_value
        data_type: numeric
        description: "Total aggregated spend of the customer."
      - name: avg_lifetime_review_score
        data_type: float64
        description: "Average overall review score across lifetime orders."

  - name: dim_products
    description: "Gold layer product dimension, storing catalog details and categories."
    columns:
      - name: product_id
        data_type: string
        description: "Primary key of the product."
        tests:
          - unique
          - not_null
      - name: product_category_name
        data_type: string
        description: "Standardized category name of the product."
      - name: product_weight_g
        data_type: numeric
        description: "Product weight in grams."

  - name: dim_sellers
    description: "Gold layer seller dimension, capturing seller geographic details."
    columns:
      - name: seller_id
        data_type: string
        description: "Primary key of the seller."
        tests:
          - unique
          - not_null
      - name: seller_city
        data_type: string
        description: "City where the seller is registered."
      - name: seller_state
        data_type: string
        description: "State acronym where the seller is registered."

  - name: fct_order_items
    description: "Gold layer granular fact table, recording line-item details of order payments and prices."
    columns:
      - name: order_id
        data_type: string
        description: "Foreign key linking to the order."
        tests:
          - not_null
      - name: order_item_id
        data_type: integer
        description: "Unique sequence number of the item within the order."
        tests:
          - not_null
      - name: product_id
        data_type: string
        description: "Foreign key linking to the product."
        tests:
          - not_null
      - name: seller_id
        data_type: string
        description: "Foreign key linking to the seller."
        tests:
          - not_null
      - name: price
        data_type: numeric
        description: "Unit price of the sold item."
      - name: freight_value
        data_type: numeric
        description: "Freight cost associated with the item shipment."
      - name: total_item_value
        data_type: numeric
        description: "Calculated sum of price and freight value."

  - name: mart_category_performance
    description: "Pre-aggregated mart measuring sales and revenue trends per product category."
    columns:
      - name: product_category_name
        data_type: string
        description: "Product category name."
        tests:
          - unique
          - not_null
      - name: total_orders
        data_type: integer
        description: "Total unique orders placed in this category."
      - name: total_items_sold
        data_type: integer
        description: "Total count of individual items sold."
      - name: total_revenue
        data_type: numeric
        description: "Aggregated revenue generated by this category."
      - name: average_item_price
        data_type: numeric
        description: "Average price of items sold in this category."

  - name: mart_seller_performance
    description: "Pre-aggregated mart measuring revenue, order count, and shipping statistics per seller."
    columns:
      - name: seller_id
        data_type: string
        description: "Primary key of the seller."
        tests:
          - unique
          - not_null
      - name: seller_city
        data_type: string
        description: "City of the seller."
      - name: seller_state
        data_type: string
        description: "State acronym of the seller."
      - name: total_orders_fulfilled
        data_type: integer
        description: "Total unique order transactions fulfilled by the seller."
      - name: total_items_sold
        data_type: integer
        description: "Total volume of individual items sold by the seller."
      - name: total_revenue
        data_type: numeric
        description: "Aggregated price revenue generated by the seller."
      - name: total_freight_value
        data_type: numeric
        description: "Aggregated freight shipping costs incurred."
      - name: average_item_price
        data_type: numeric
        description: "Average unit price of items sold."
