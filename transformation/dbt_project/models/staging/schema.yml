version: 2

models:
  - name: stg_orders
    description: "Staged orders dataset with standardized datatypes and schema. Resolved dynamically for BigQuery and Snowflake."
    columns:
      - name: order_id
        description: "Primary key of the order."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to customer details."
        tests:
          - not_null
      - name: order_status
        description: "Status of the order transaction."
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'invoiced', 'processing', 'approved', 'unavailable', 'created']

  - name: stg_customers
    description: "Staged customer details, linking customer registration keys to unique identity keys."
    columns:
      - name: customer_id
        description: "Primary key for a specific transaction registration."
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: "Unique persistent ID of the customer."
        tests:
          - not_null

  - name: stg_order_items
    description: "Staged order items sequence representing transaction lines."
    columns:
      - name: order_id
        description: "Foreign key of the order."
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: order_item_sequence
        description: "Sequence number of the item within the order."
        tests:
          - not_null

  - name: stg_payments
    description: "Staged order payment details, aggregating value and installment parameters."
    columns:
      - name: order_id
        description: "Foreign key of the order."
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: payment_type
        description: "Payment method type used."
        tests:
          - accepted_values:
              values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']

  - name: stg_products
    description: "Staged product catalog details containing category names and dimensions."
    columns:
      - name: product_id
        description: "Primary key of the product."
        tests:
          - unique
          - not_null
      - name: product_category_name
        description: "Category name of the product."

  - name: stg_sellers
    description: "Staged seller registry details including geographic location details."
    columns:
      - name: seller_id
        description: "Primary key of the seller."
        tests:
          - unique
          - not_null
      - name: seller_city
        description: "City where the seller is located."
      - name: seller_state
        description: "State where the seller is located."

  - name: stg_reviews
    description: "Staged customer transaction review scores and comments."
    columns:
      - name: review_id
        description: "Primary key of the review."
        tests:
          - not_null
      - name: order_id
        description: "Foreign key linking to the reviewed order."
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: review_score
        description: "Satisfaction rating score (1-5)."

  - name: stg_product_categories
    description: "Staged translation catalog mapping native Portuguese category names to English."
    columns:
      - name: product_category_name
        description: "Native Portuguese category name."
        tests:
          - unique
          - not_null
      - name: product_category_name_english
        description: "Translated English category name."
        tests:
          - unique
          - not_null

  - name: stg_geolocation
    description: "Staged postal code geographic coordinates maps (latitude and longitude)."
    columns:
      - name: geolocation_zip_code_prefix
        description: "Postal code zip code prefix."
        tests:
          - not_null
