name: 'Terraform CI'

on:
  push:
    paths:
      - 'infrastructure/**'

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: ./infrastructure/gcp

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./infrastructure/gcp

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./infrastructure/gcp
